<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Clinic — Appointment & Patient Flow Management</title>
  <meta name="description" content="Smart Clinic System: Manage appointments, track patient flow, and monitor clinic operations in real-time.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/patient.css">
  <link rel="stylesheet" href="/css/doctor.css">
  <link rel="stylesheet" href="/css/reception.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon-wrap"><span class="brand-icon">🏥</span></div>
        <div class="brand-text"><h1>Smart Clinic</h1><span class="brand-sub">Patient Flow System</span></div>
      </div>
      <nav id="main-nav">
        <div class="nav-section-label">Main Modules</div>
        <a href="#/patient" class="nav-item" data-view="patient" id="nav-patient">
          <span class="nav-icon">📋</span><span class="nav-label">Patient Portal</span>
        </a>
        <a href="#/doctor" class="nav-item" data-view="doctor" id="nav-doctor">
          <span class="nav-icon">🩺</span><span class="nav-label">Doctor Dashboard</span>
        </a>
        <a href="#/reception" class="nav-item" data-view="reception" id="nav-reception">
          <span class="nav-icon">🖥️</span><span class="nav-label">Reception Desk</span>
        </a>
        <div class="nav-divider"></div>
        <div class="nav-section-label">Other Features</div>
        <a href="#/availability" class="nav-item" data-view="placeholder" id="nav-availability">
          <span class="nav-icon">📅</span><span class="nav-label">Availability</span>
        </a>
        <a href="#/reports" class="nav-item" data-view="placeholder" id="nav-reports">
          <span class="nav-icon">📊</span><span class="nav-label">Reports</span>
        </a>
        <a href="#/notifications" class="nav-item" data-view="placeholder" id="nav-notifications">
          <span class="nav-icon">🔔</span><span class="nav-label">Notifications</span>
        </a>
        <a href="#/audit" class="nav-item" data-view="placeholder" id="nav-audit">
          <span class="nav-icon">📝</span><span class="nav-label">Audit Log</span>
        </a>
        <a href="#/settings" class="nav-item" data-view="placeholder" id="nav-settings">
          <span class="nav-icon">⚙️</span><span class="nav-label">Settings</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-clock" id="sidebar-clock"></div>
        <button id="reset-demo-btn" class="btn btn-reset">🔄 Reset Demo Data</button>
      </div>
    </aside>
    <main id="main-content"><div id="view-container"></div></main>
  </div>
  <div id="toast-container"></div>
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-content" class="modal-content"></div>
  </div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
